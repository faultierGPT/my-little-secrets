name: Release

# Tag a release: `git tag v0.1.0 && git push origin v0.1.0`.
# Required repo secrets (never printed): MLS_GPG_PRIVATE_KEY (armored), MLS_GPG_KEY_ID,
# MLS_ANDROID_KEYSTORE_BASE64, MLS_ANDROID_KEYSTORE_PASSWORD, MLS_ANDROID_KEY_ALIAS,
# MLS_ANDROID_KEY_PASSWORD.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the server image to GHCR

jobs:
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y binutils fakeroot
      - name: Package (.tar.gz + .deb, jlinked runtime)
        run: MLS_VERSION="${GITHUB_REF_NAME#v}" ./scripts/package-desktop.sh
      - uses: actions/upload-artifact@v4
        with: { name: desktop-linux, path: dist/* }

  android:
    name: Android APK (signed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - uses: android-actions/setup-android@v3
      - name: Restore keystore
        env:
          KEYSTORE_B64: ${{ secrets.MLS_ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/android-release.jks"
      - name: Build signed release APK
        env:
          MLS_ANDROID_KEYSTORE: ${{ runner.temp }}/android-release.jks
          MLS_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.MLS_ANDROID_KEYSTORE_PASSWORD }}
          MLS_ANDROID_KEY_ALIAS: ${{ secrets.MLS_ANDROID_KEY_ALIAS }}
          MLS_ANDROID_KEY_PASSWORD: ${{ secrets.MLS_ANDROID_KEY_PASSWORD }}
        run: |
          echo 'include(":android")' >> settings.gradle.kts
          ./gradlew :android:assembleRelease --no-daemon --stacktrace
          mkdir -p dist
          cp android/build/outputs/apk/release/android-release.apk \
             "dist/my-little-secrets-${GITHUB_REF_NAME#v}.apk"
      - uses: actions/upload-artifact@v4
        with: { name: android-apk, path: dist/* }

  publish:
    name: Sign & publish release
    needs: [desktop-linux, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: staged }
      - name: Collect artifacts
        run: |
          mkdir -p dist
          find staged -type f -exec cp {} dist/ \;
          ls -l dist
      - name: Import GPG signing key
        env:
          MLS_GPG_PRIVATE_KEY: ${{ secrets.MLS_GPG_PRIVATE_KEY }}
        run: printf '%s' "$MLS_GPG_PRIVATE_KEY" | gpg --batch --import
      - name: Export public key for verifiers
        env:
          MLS_GPG_KEY_ID: ${{ secrets.MLS_GPG_KEY_ID }}
        run: gpg --armor --export "$MLS_GPG_KEY_ID" > dist/publisher-pubkey.asc
      - name: Checksums + signatures
        env:
          MLS_GPG_KEY_ID: ${{ secrets.MLS_GPG_KEY_ID }}
        run: ./scripts/sign-artifacts.sh dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## Verify before installing

            ```bash
            gpg --import publisher-pubkey.asc          # first time; check the fingerprint in RELEASE.md
            ./scripts/verify-artifacts.sh .            # checks SHA256SUMS.asc + every checksum
            ```

            Artifacts: desktop (`.tar.gz`, `.deb`), Android (`.apk`), with `SHA256SUMS` + detached
            GPG signatures. The server ships as a container image (see below).

  server-image:
    name: Server image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/server:latest
