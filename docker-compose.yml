# One-command self-host: `docker compose up --build`
# The server stores only ciphertext; PostgreSQL holds opaque blobs + metadata (SECURITY.md).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mls
      POSTGRES_USER: mls
      POSTGRES_PASSWORD: ${MLS_DB_PASSWORD:-mls}
    volumes:
      - mls-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mls -d mls"]
      interval: 5s
      timeout: 5s
      retries: 12
    # No host port published by default — only the server (same compose network) reaches it.

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      MLS_PORT: "8080"
      MLS_DB_URL: jdbc:postgresql://db:5432/mls
      MLS_DB_USER: mls
      MLS_DB_PASSWORD: ${MLS_DB_PASSWORD:-mls}
      MLS_DB_DRIVER: org.postgresql.Driver
      MLS_HSTS: "true"
      MLS_TOKEN_TTL_SECONDS: "3600"
      MLS_LOGIN_MAX_ATTEMPTS: "10"
      MLS_LOGIN_LOCKOUT_SECONDS: "300"
      # MLS_CORS_HOSTS: app.example.com   # only needed if a browser client is added
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Plain HTTP on the loopback interface only. Terminate TLS at a reverse proxy in front
      # (Caddy/nginx/Traefik) — see server/README.md. Never expose this to the internet directly.
      - "127.0.0.1:8080:8080"

volumes:
  mls-db:
